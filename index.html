<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>韓語拼音初級教室 | 배우자</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', 'Noto Sans KR', sans-serif; background-color: #f3f4f6; scroll-behavior: smooth; }
        .korean-font { font-family: 'Noto Sans KR', sans-serif; }
        .quiz-option:hover { background-color: #eef2ff; border-color: #6366f1; }
        .correct { background-color: #d1fae5 !important; border-color: #10b981 !important; color: #065f46; }
        .incorrect { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b; }
        .progress-bar { transition: width 0.3s ease; }
    </style>
</head>
<body class="pb-12">

    <!-- Header -->
    <nav class="bg-indigo-600 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <span class="font-bold text-xl uppercase tracking-wider">Baewooja 韓語教室</span>
            <div class="space-x-4 text-sm">
                <a href="#vowels" class="hover:underline">字母</a>
                <a href="#simulator" class="hover:underline">拼讀</a>
                <a href="#quiz-section" class="hover:underline">測驗</a>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <header class="bg-white py-12 px-4 border-b">
        <div class="max-w-3xl mx-auto text-center">
            <h1 class="text-3xl font-extrabold text-slate-900 mb-4">韓文拼音：從零開始的互動挑戰</h1>
            <p class="text-slate-600">專為初學者設計。先學習基礎字母，透過模擬器練習拼寫，最後參加 10 題實力測驗！</p>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 mt-8 space-y-12">

        <!-- 1. 基礎母音介紹 -->
        <section id="vowels">
            <h2 class="text-xl font-bold mb-4 flex items-center text-indigo-700">
                <i class="fas fa-book-open mr-2"></i> 1. 基礎字母一覽
            </h2>
            <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
                <!-- 母音卡片 -->
                <div class="bg-white p-4 rounded-xl shadow-sm text-center border-2 border-transparent hover:border-indigo-300 transition">
                    <div class="text-3xl font-bold korean-font mb-1">ㅏ</div>
                    <div class="text-indigo-500 font-bold">a</div>
                    <div class="text-xs text-slate-400">像「啊」</div>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm text-center border-2 border-transparent hover:border-indigo-300 transition">
                    <div class="text-3xl font-bold korean-font mb-1">ㅓ</div>
                    <div class="text-indigo-500 font-bold">eo</div>
                    <div class="text-xs text-slate-400">像「噢」</div>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm text-center border-2 border-transparent hover:border-indigo-300 transition">
                    <div class="text-3xl font-bold korean-font mb-1">ㅗ</div>
                    <div class="text-indigo-500 font-bold">o</div>
                    <div class="text-xs text-slate-400">像「喔」</div>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm text-center border-2 border-transparent hover:border-indigo-300 transition">
                    <div class="text-3xl font-bold korean-font mb-1">ㅜ</div>
                    <div class="text-indigo-500 font-bold">u</div>
                    <div class="text-xs text-slate-400">像「嗚」</div>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm text-center border-2 border-transparent hover:border-indigo-300 transition">
                    <div class="text-3xl font-bold korean-font mb-1">ㅣ</div>
                    <div class="text-indigo-500 font-bold">i</div>
                    <div class="text-xs text-slate-400">像「依」</div>
                </div>
            </div>
        </section>

        <!-- 2. 拼讀模擬器 -->
        <section id="simulator" class="bg-indigo-50 rounded-2xl p-6 border border-indigo-100">
            <h2 class="text-xl font-bold mb-4 text-indigo-800">2. 互動拼讀練習</h2>
            <div class="flex flex-col md:flex-row items-center justify-center gap-6">
                <div class="flex gap-4">
                    <div class="text-center">
                        <label class="text-xs text-indigo-400 block mb-1">子音</label>
                        <select id="con" onchange="updateResult()" class="p-3 rounded-lg border-2 border-indigo-200 text-xl font-bold korean-font bg-white">
                            <option value="ㄱ">ㄱ (g/k)</option>
                            <option value="ㄴ">ㄴ (n)</option>
                            <option value="ㄷ">ㄷ (d/t)</option>
                            <option value="ㅂ">ㅂ (b/p)</option>
                            <option value="ㅅ">ㅅ (s)</option>
                            <option value="ㅇ">ㅇ (不發音)</option>
                        </select>
                    </div>
                    <div class="text-2xl mt-8 text-indigo-300">+</div>
                    <div class="text-center">
                        <label class="text-xs text-indigo-400 block mb-1">母音</label>
                        <select id="vow" onchange="updateResult()" class="p-3 rounded-lg border-2 border-indigo-200 text-xl font-bold korean-font bg-white">
                            <option value="ㅏ">ㅏ (a)</option>
                            <option value="ㅓ">ㅓ (eo)</option>
                            <option value="ㅗ">ㅗ (o)</option>
                            <option value="ㅜ">ㅜ (u)</option>
                            <option value="ㅣ">ㅣ (i)</option>
                        </select>
                    </div>
                </div>
                <div class="bg-white w-40 h-40 rounded-full flex flex-col items-center justify-center shadow-lg border-4 border-indigo-400 transform hover:scale-105 transition">
                    <div id="res-char" class="text-6xl font-bold text-indigo-600 korean-font">가</div>
                    <div id="res-rom" class="text-slate-400 mt-2 italic">ga</div>
                </div>
            </div>
        </section>

        <!-- 3. 10 題 Quiz 測驗 -->
        <section id="quiz-section" class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="bg-slate-800 text-white p-6 flex justify-between items-center">
                <h2 class="text-xl font-bold">3. 拼音實力測驗 (10題)</h2>
                <span id="score-display" class="bg-indigo-500 px-3 py-1 rounded text-sm">分數: 0 / 10</span>
            </div>
            
            <div id="quiz-container" class="p-8 space-y-8">
                <!-- 題目會由 JavaScript 動態生成 -->
            </div>

            <div id="final-result" class="hidden p-8 text-center bg-indigo-50">
                <h3 class="text-2xl font-bold text-indigo-900 mb-2">測驗結束！</h3>
                <p id="final-score-text" class="text-lg text-indigo-700 mb-6 font-bold"></p>
                <button onclick="location.reload()" class="bg-indigo-600 text-white px-8 py-3 rounded-full font-bold hover:bg-indigo-700 shadow-md">
                    重新挑戰
                </button>
            </div>
        </section>

    </main>

    <footer class="mt-20 text-center text-slate-400 text-sm">
        <p>© 2026 Baewooja KorLearners | 韓語拼音入門互動站</p>
    </footer>

    <script>
        const mapping = {
            'ㄱㅏ': 'ga', 'ㄱㅓ': 'geo', 'ㄱㅗ': 'go', 'ㄱㅜ': 'gu', 'ㄱㅣ': 'gi',
            'ㄴㅏ': 'na', 'ㄴㅓ': 'neo', 'ㄴㅗ': 'no', 'ㄴㅜ': 'nu', 'ㄴㅣ': 'ni',
            'ㄷㅏ': 'da', 'ㄷㅓ': 'deo', 'ㄷㅗ': 'do', 'ㄷㅜ': 'du', 'ㄷㅣ': 'di',
            'ㅂㅏ': 'ba', 'ㅂㅓ': 'beo', 'ㅂㅗ': 'bo', 'ㅂㅜ': 'bu', 'ㅂㅣ': 'bi',
            'ㅅㅏ': 'sa', 'ㅅㅓ': 'seo', 'ㅅㅗ': 'so', 'ㅅㅜ': 'su', 'ㅅㅣ': 'si',
            'ㅇㅏ': 'a', 'ㅇㅓ': 'eo', 'ㅇㅗ': 'o', 'ㅇㅜ': 'u', 'ㅇㅣ': 'i'
        };

        const quizData = [
            { q: "請問「ㅓ」的羅馬拼音是什麼？", options: ["o", "eo", "u"], correct: 1 },
            { q: "韓劇常見的「笨蛋 (babo)」怎麼寫？", options: ["바보", "가수", "아이"], correct: 0 },
            { q: "當「ㅇ」放在字首（如：아）時，它的發音是？", options: ["發 ng 音", "不發音", "發 h 音"], correct: 1 },
            { q: "「ㄱ」與「ㅏ」組合後的字是？", options: ["가", "나", "다"], correct: 0 },
            { q: "「牛奶 (u-yu)」的韓文是？", options: ["우유", "아이", "오이"], correct: 0 },
            { q: "「ㅣ」的發音接近中文的？", options: ["嗚", "喔", "依"], correct: 2 },
            { q: "「ㅂ」這個字母對應哪個羅馬拼音？", options: ["n", "b / p", "s"], correct: 1 },
            { q: "「ㅅ」與「ㅗ」組合起來是什麼字？", options: ["사", "서", "소"], correct: 2 },
            { q: "「雨 (bi)」的正確寫法是？", options: ["비", "디", "미"], correct: 0 },
            { q: "哪一個母音發音時嘴巴要縮成「小圓形」？", options: ["ㅏ", "ㅓ", "ㅗ"], correct: 2 }
        ];

        let currentScore = 0;
        let answeredCount = 0;

        function updateResult() {
            const con = document.getElementById('con').value;
            const vow = document.getElementById('vow').value;
            const initialConsonants = ['ㄱ', 'ㄲ', 'ㄴ', 'ㄷ', 'ㄸ', 'ㄹ', 'ㅁ', 'ㅂ', 'ㅃ', 'ㅅ', 'ㅆ', 'ㅇ', 'ㅈ', 'ㅉ', 'ㅊ', 'ㅋ', 'ㅌ', 'ㅍ', 'ㅎ'];
            const medialVowels = ['ㅏ', 'ㅐ', 'ㅑ', 'ㅒ', 'ㅓ', 'ㅔ', 'ㅕ', 'ㅖ', 'ㅗ', 'ㅘ', 'ㅙ', 'ㅚ', 'ㅛ', 'ㅜ', 'ㅝ', 'ㅞ', 'ㅟ', 'ㅠ', 'ㅡ', 'ㅢ', 'ㅣ'];
            const i = initialConsonants.indexOf(con);
            const m = medialVowels.indexOf(vow);
            const charCode = 44032 + (i * 588) + (m * 28);
            document.getElementById('res-char').innerText = String.fromCharCode(charCode);
            document.getElementById('res-rom').innerText = mapping[con + vow] || '...';
        }

        function initQuiz() {
            const container = document.getElementById('quiz-container');
            quizData.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = `quiz-item ${index > 0 ? 'border-t pt-8' : ''}`;
                div.innerHTML = `
                    <p class="font-bold text-lg mb-4 text-slate-700">Q${index+1}. ${item.q}</p>
                    <div class="grid grid-cols-1 gap-2">
                        ${item.options.map((opt, optIndex) => `
                            <button onclick="checkAnswer(this, ${index}, ${optIndex})" class="quiz-option border-2 p-3 rounded-xl text-left transition ${index > 0 ? 'korean-font' : ''}">
                                ${String.fromCharCode(65 + optIndex)}. ${opt}
                            </button>
                        `).join('')}
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function checkAnswer(btn, qIndex, optIndex) {
            const parent = btn.parentElement;
            const buttons = parent.querySelectorAll('button');
            const correctIndex = quizData[qIndex].correct;

            buttons.forEach(b => {
                b.disabled = true;
                b.classList.remove('quiz-option');
            });

            if (optIndex === correctIndex) {
                btn.classList.add('correct');
                currentScore++;
                btn.innerHTML += ' <i class="fas fa-check-circle ml-2"></i>';
            } else {
                btn.classList.add('incorrect');
                btn.innerHTML += ' <i class="fas fa-times-circle ml-2"></i>';
                buttons[correctIndex].classList.add('correct');
            }

            answeredCount++;
            document.getElementById('score-display').innerText = `分數: ${currentScore} / 10`;

            if (answeredCount === quizData.length) {
                showFinalResult();
            }
        }

        function showFinalResult() {
            const finalDiv = document.getElementById('final-result');
            const scoreText = document.getElementById('final-score-text');
            finalDiv.classList.remove('hidden');
            scoreText.innerText = `恭喜完成！你的得分是：${currentScore} / 10`;
            window.scrollTo(0, document.body.scrollHeight);
        }

        window.onload = () => {
            updateResult();
            initQuiz();
        };
    </script>
</body>
</html>
